services:
  # ===========================
  # NGINX Reverse Proxy
  # ===========================
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - portfolio_net
    depends_on:
      - dashboard_frontend
      - portfolio_frontend
      - dashboard_backend
      - springboot_backend

  # ===========================
  # Dashboard Frontend (Angular)
  # ===========================
  dashboard_frontend:
    build:
      context: ./apps/dashboard-admin/frontend
    container_name: dashboard_frontend
    ports:
      - "4200:80"
    networks:
      - portfolio_net
    depends_on:
      dashboard_backend:
        condition: service_healthy

  # ===========================
  # Portfolio Frontend (React)
  # ===========================
  portfolio_frontend:
    build:
      context: ./apps/portfolio
    container_name: portfolio_frontend
    ports:
      - "3001:80"
    networks:
      - portfolio_net
    depends_on:
      dashboard_backend:
        condition: service_healthy

  # ===========================
  # Dashboard Backend (FastAPI)
  # ===========================
  dashboard_backend:
    build: ./apps/dashboard-admin/backend/
    container_name: dashboard_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./apps/dashboard-admin/backend/:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # Spring Boot Backend (Java)
  # ===========================
  springboot_backend:
    build:
      context: ./apps/dashboard-admin/springboot
    container_name: springboot_backend
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ===========================
  # PostgreSQL Database
  # ===========================
  db:
    image: postgres:16-alpine
    container_name: dashboard_db
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - portfolio_db:/var/lib/postgresql/data
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================
  # Vector Database (RAG)
  # ===========================
  vector_db:
    image: pgvector/pgvector:pg16
    container_name: vector_db
    environment:
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vector_store
    ports:
      - "5433:5432"
    volumes:
      - vector_db_data:/var/lib/postgresql/data
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================
  # Oracle Database
  # ===========================
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    restart: always
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ===========================
  # Kafka & Zookeeper
  # ===========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    networks:
      - portfolio_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo 'ruok' | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    networks:
      - portfolio_net
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # =================================================================
  # LLM Gateway, Dart runtime, Go runtime, and Ollama runtime (local)
  # =================================================================
  llm-gateway:
    build: ./apps/llm-gateway
    container_name: llm-gateway
    ports:
      - "8002:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DART_SERVICE_URL=http://dart-runtime:8080
      - GO_SERVICE_URL=http://go-runtime:8081
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=llm.inference.events
    depends_on:
      - dart-runtime
      - go-runtime
      - kafka
    networks:
      - portfolio_net

  dart-runtime:
    build: ./apps/dart-runtime
    container_name: dart-runtime
    ports:
      - "8090:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8080
    networks:
      - portfolio_net

  go-runtime:
    build: ./apps/go-runtime
    container_name: go-runtime
    ports:
      - "8091:8081"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8081
    networks:
      - portfolio_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - portfolio_net

  # ===========================
  # MongoDB (Analytics Store)
  # ===========================
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # Express Analytics Service
  # ===========================
  express-analytics:
    build:
      context: ./apps/express-analytics
    container_name: express_analytics
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=llm.inference.events
      - PORT=3000
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # GraphQL API Gateway
  # ===========================
  graphql-gateway:
    build:
      context: ./apps/graphql-gateway
    container_name: graphql-gateway
    restart: always
    ports:
      - "4000:4000"
    environment:
      - FASTAPI_URL=http://dashboard_backend:8000
      - SPRINGBOOT_URL=http://springboot_backend:8081
      - ANALYTICS_URL=http://express_analytics:3000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
    depends_on:
      dashboard_backend:
        condition: service_healthy
      springboot_backend:
        condition: service_healthy
      express-analytics:
        condition: service_healthy
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/.well-known/apollo/server-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # LangGraph Agent Service
  # ===========================
  langgraph-agent:
    build: ./apps/langgraph-agent
    container_name: langgraph_agent
    restart: always
    volumes:
      - ./apps/langgraph-agent/app:/app  # Real time sync
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Reuse vars to build Conection URL
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio_net

networks:
  portfolio_net:
    name: portfolio-network
    driver: bridge

volumes:
  portfolio_db:
    driver: local
  oracle-data:
    driver: local
  ollama-data:
    driver: local
  vector_db_data:
    driver: local
  mongodb_data:
    driver: local
