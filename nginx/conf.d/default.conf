server {
    listen 80;
    server_name localhost;

    # Route to your React/Next.js frontend
    location / {
        proxy_pass http://portfolio_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # <-- this was missing
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Route to your Dashboard backend
    location /api/ {
        proxy_pass http://dashboard_backend:8000/;
        proxy_set_header Host $host;
    }
}
