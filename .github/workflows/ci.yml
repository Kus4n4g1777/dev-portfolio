# ============================================================
# CI Pipeline — Dev Portfolio
# ============================================================
#
# What this validates on every push and pull request:
#
# 1. Docker Compose config — catches YAML errors before they
#    reach production. Saved me more than once after copy-paste
#    accidents (see: the great compose duplication incident).
#
# 2. Python linting (ruff) — FastAPI and LLM Gateway.
#    Catches syntax errors, unused imports, obvious bugs.
#    Not a replacement for unit tests, but better than nothing.
#
# 3. Node.js linting (eslint) — Express Analytics and GraphQL
#    gateway. Same philosophy as above.
#
# 4. Angular unit tests — the only formal test suite we have.
#    Runs ng test in headless Chrome mode.
#
# Why not run docker compose up here?
# Spinning up 27 containers in CI would take ~5 minutes,
# require secrets for all services, and is overkill for
# a portfolio project. The compose config check catches
# structural errors; real integration testing happens locally.
#
# Trigger:
# - push to main or develop
# - any pull request targeting main
#
# Runtime: ubuntu-latest (GitHub-hosted runner, free tier)
# Estimated CI time: ~3-4 minutes

name: CI — Validate Stack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # JOB 1: Docker Compose Validation
  # ============================================================
  # Validates the compose file structure without starting
  # any containers. Catches: YAML syntax errors, invalid
  # service references, missing required fields.
  #
  # This is the cheapest and most valuable check in the pipeline.
  # A broken compose file means nothing starts — catch it here.
  compose-validation:
    name: 🐳 Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml structure
        run: docker compose config --quiet
        # --quiet suppresses the full resolved config output
        # Exit code 0 = valid, non-zero = error

      - name: Check all service build contexts exist
        # Verifies that every `build: context:` path actually
        # exists in the repo — catches renamed/moved directories
        run: |
          echo "🔍 Checking build contexts..."
          for dir in \
            apps/dashboard-admin/backend \
            apps/dashboard-admin/frontend \
            apps/dashboard-admin/springboot \
            apps/express-analytics \
            apps/graphql-gateway \
            apps/llm-gateway \
            apps/dart-runtime \
            apps/go-runtime \
            apps/portfolio; do
            if [ -d "$dir" ]; then
              echo "  ✅ $dir"
            else
              echo "  ❌ MISSING: $dir"
              exit 1
            fi
          done
          echo "All build contexts present."

  # ============================================================
  # JOB 2: Python Linting — FastAPI + LLM Gateway
  # ============================================================
  # Uses ruff — the fastest Python linter (written in Rust).
  # Replaces flake8 + isort + pyupgrade in one tool.
  # Catches: syntax errors, undefined names, unused imports,
  # common bugs (mutable defaults, etc.)
  #
  # We lint both Python services independently since they have
  # separate requirements and might have different issues.
  python-lint:
    name: 🐍 Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint FastAPI backend
        # --select E,F: pycodestyle errors + pyflakes (syntax, undefined names)
        # --ignore E501: skip line-length (handled by formatter, not linter)
        run: |
          echo "🔍 Linting FastAPI backend..."
          ruff check apps/dashboard-admin/backend/ \
            --select E,F,W \
            --ignore E501,W503 \
            --exclude "*/migrations/*,*/alembic/*" \
            || true
          # `|| true` — warn but don't fail for now
          # Remove when codebase is lint-clean

      - name: Lint LLM Gateway
        run: |
          echo "🔍 Linting LLM Gateway..."
          ruff check apps/llm-gateway/ \
            --select E,F,W \
            --ignore E501,W503 \
            || true

  # ============================================================
  # JOB 3: Node.js Linting — Express Analytics + GraphQL Gateway
  # ============================================================
  # Runs eslint on both Node services.
  # If no .eslintrc exists, falls back to basic syntax check
  # via node --check (parses the file without executing it).
  #
  # Why separate from compose validation?
  # Jobs run in parallel — Python and Node lint run simultaneously
  # while compose validation runs. Total CI time stays low.
  node-lint:
    name: 🟨 Node.js Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check — Express Analytics
        # node --check parses JS without executing it
        # Catches: syntax errors, invalid ES module imports
        run: |
          echo "🔍 Checking Express Analytics syntax..."
          find apps/express-analytics/src -name "*.js" | while read f; do
            node --check "$f" && echo "  ✅ $f" || exit 1
          done

      - name: Syntax check — GraphQL Gateway
        run: |
          echo "🔍 Checking GraphQL Gateway syntax..."
          find apps/graphql-gateway/src -name "*.js" | while read f; do
            node --check "$f" && echo "  ✅ $f" || exit 1
          done

  # ============================================================
  # JOB 4: Angular Unit Tests
  # ============================================================
  # The only formal test suite in the project.
  # Runs ng test in headless Chrome mode (no display needed).
  #
  # Note: Angular tests run in the CI environment's Chrome.
  # The ChromeHeadlessNoSandbox config is required in CI
  # because the GitHub runner doesn't have a sandbox environment.
  # This was already configured in the Angular project —
  # it's the same config used for local headless testing.
  angular-tests:
    name: 🅰️ Angular Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard-admin/frontend/package-lock.json

      - name: Install Angular dependencies
        working-directory: apps/dashboard-admin/frontend
        run: npm ci
        # npm ci is faster than npm install in CI —
        # uses package-lock.json exactly, no version resolution

      - name: Run Angular unit tests (headless)
        working-directory: apps/dashboard-admin/frontend
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox
        # --watch=false: run once and exit (not interactive mode)
        # ChromeHeadlessNoSandbox: required in CI environments
