name: CI — Validate Stack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # JOB 1: Docker Compose Validation
  # ============================================================
  # Validates the compose file structure without starting containers.
  # Catches YAML errors, invalid service references, missing fields.
  #
  # The compose file uses ${VARIABLE} interpolation AND env_file directives
  # which require a physical .env file to exist. We create a dummy
  # with placeholder values in the same shell step as the validation —
  # keeping creation and validation in one run block guarantees the
  # file exists in the same shell process that runs docker compose.
  compose-validation:
    name: 🐳 Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create dummy .env and validate compose structure
        run: |
          echo "🧹 Cleaning up any ghost .env files..."
          rm -f .env

          echo "📝 Writing dummy .env file..."
          cat << 'EOF' > .env
          DB_USER=ci_user
          DB_PASSWORD=ci_password
          DB_NAME=ci_db
          DB_HOST=dashboard_db
          ORACLE_PASSWORD=ci_oracle
          ORACLE_XE_DB=XEPDB1
          MONGO_USER=ci_admin
          MONGO_PASSWORD=ci_mongo
          MONGO_DB=ci_analytics
          DATABASE_URL=postgresql://ci_user:ci_password@dashboard_db:5432/ci_db
          SECRET_KEY=ci_secret_key_32_chars_minimum_xx
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          GEMINI_API_KEY=ci_gemini_key
          JWT_SECRET=ci_jwt_secret
          LAMBDA_URL=https://example.com/lambda
          EOF

          echo "🔍 Verifying .env exists on the runner:"
          ls -la .env

          echo "🐳 Running docker compose config..."
          docker compose --env-file .env config --quiet
          echo "✅ Compose structure is valid"

      - name: Check all service build contexts exist
        run: |
          echo "🔍 Checking build contexts..."
          for dir in \
            apps/dashboard-admin/backend \
            apps/dashboard-admin/frontend \
            apps/dashboard-admin/springboot \
            apps/express-analytics \
            apps/graphql-gateway \
            apps/llm-gateway \
            apps/dart-runtime \
            apps/go-runtime \
            apps/portfolio; do
            if [ -d "$dir" ]; then
              echo "  ✅ $dir"
            else
              echo "  ❌ MISSING: $dir"
              exit 1
            fi
          done
          echo "All build contexts present."

  # ============================================================
  # JOB 2: Python Linting — FastAPI + LLM Gateway
  # ============================================================
  # Uses ruff — fast Python linter written in Rust.
  # Catches syntax errors, undefined names, unused imports.
  # || true: warns but doesn't fail until codebase is lint-clean.
  python-lint:
    name: 🐍 Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint FastAPI backend
        run: |
          echo "🔍 Linting FastAPI backend..."
          ruff check apps/dashboard-admin/backend/ \
            --select E,F,W \
            --ignore E501,W503 \
            --exclude "*/migrations/*,*/alembic/*" \
            || true

      - name: Lint LLM Gateway
        run: |
          echo "🔍 Linting LLM Gateway..."
          ruff check apps/llm-gateway/ \
            --select E,F,W \
            --ignore E501,W503 \
            || true

  # ============================================================
  # JOB 3: Node.js Syntax Check — Express Analytics + GraphQL
  # ============================================================
  # node --check parses JS without executing it.
  # Catches syntax errors and invalid ES module structure.
  node-lint:
    name: 🟨 Node.js Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check — Express Analytics
        run: |
          echo "🔍 Checking Express Analytics syntax..."
          find apps/express-analytics/src -name "*.js" | while read f; do
            node --check "$f" && echo "  ✅ $f" || exit 1
          done

      - name: Syntax check — GraphQL Gateway
        run: |
          echo "🔍 Checking GraphQL Gateway syntax..."
          find apps/graphql-gateway/src -name "*.js" | while read f; do
            node --check "$f" && echo "  ✅ $f" || exit 1
          done

  # ============================================================
  # JOB 4: Angular Unit Tests
  # ============================================================
  # The only formal test suite in the project.
  # Runs ng test in headless Chrome — no display needed in CI.
  # ChromeHeadlessNoSandbox required in GitHub-hosted runners.
  angular-tests:
    name: 🅰️ Angular Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard-admin/frontend/package-lock.json

      - name: Install Angular dependencies
        working-directory: apps/dashboard-admin/frontend
        run: npm ci

      - name: Run Angular unit tests (headless)
        working-directory: apps/dashboard-admin/frontend
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox
